<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>📌 {{ event.title }} — Live Pin</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script>(function(){var t=localStorage.getItem('athena-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin:0; padding:0; overflow:hidden; height:100vh; background: #070b14; }

    /* ── PIN WRAPPER ── */
    #pin-root {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(0,200,150,0.08) 0%, transparent 55%),
                  radial-gradient(ellipse at 70% 80%, rgba(249,115,22,0.08) 0%, transparent 55%),
                  #070b14;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      position: relative;
    }

    /* ── TOP STRIP ── */
    #pin-topstrip {
      position: absolute; top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    #pin-topstrip .logo { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
    #pin-topstrip .actions { display: flex; gap: 8px; align-items: center; }
    .pin-ctrl-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 5px 12px; color: rgba(255,255,255,0.6);
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    }
    .pin-ctrl-btn:hover { background: rgba(255,255,255,0.1); color: white; }

    /* ── SPORT LABEL ── */
    #pin-sport-label {
      font-size: 13px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.25); margin-bottom: 20px; margin-top: 56px;
    }

    /* ── MAIN SCORE CARD ── */
    #pin-card {
      width: min(880px, 96vw);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 40px 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 24px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    #pin-card::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse at 15% 50%, rgba(0,200,150,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse at 85% 50%, rgba(249,115,22,0.07) 0%, transparent 60%);
    }

    /* ── TEAM BLOCK ── */
    .pin-team { text-align: center; }
    .pin-team-name {
      font-size: clamp(16px, 3vw, 24px); font-weight: 900; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .pin-team-name.t1 { color: var(--accent); }
    .pin-team-name.t2 { color: #f97316; }
    .pin-team-players {
      font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 16px;
      min-height: 18px; font-weight: 500;
    }
    .pin-score {
      font-size: clamp(72px, 14vw, 128px);
      font-weight: 900; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .pin-score.t1 { color: var(--accent); text-shadow: 0 0 60px rgba(0,200,150,0.35); }
    .pin-score.t2 { color: #f97316; text-shadow: 0 0 60px rgba(249,115,22,0.35); }
    .pin-serving {
      font-size: 12px; font-weight: 800; letter-spacing: 1px;
      color: #10b981; height: 24px; margin-top: 6px;
    }

    /* ── CENTER BLOCK ── */
    .pin-center { text-align: center; min-width: 120px; }
    .pin-vs { font-size: 20px; font-weight: 900; color: rgba(255,255,255,0.2); margin: 8px 0; }
    .pin-game-label {
      font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.25); margin-bottom: 4px;
    }
    .pin-game-num { font-size: 32px; font-weight: 900; color: rgba(255,255,255,0.6); }
    .pin-badges { display:flex; flex-direction:column; gap:6px; align-items:center; margin-top:10px; }
    .pin-badge-live { background:#ef4444; color:white; border-radius:20px; padding:4px 14px; font-size:12px; font-weight:800; letter-spacing:1.5px; animation: pulse-red 1.5s ease-in-out infinite; }
    .pin-badge-final { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); border-radius:20px; padding:4px 14px; font-size:12px; font-weight:700; letter-spacing:1.5px; }
    .pin-badge-deuce { background:#eab308; color:#000; border-radius:12px; padding:3px 12px; font-size:12px; font-weight:800; }
    .pin-badge-mp { background:linear-gradient(90deg,#c56ef8,#ec4899); color:white; border-radius:12px; padding:3px 12px; font-size:11px; font-weight:800; animation: glow-mp 1s ease-in-out infinite alternate; }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 10px rgba(239,68,68,0)} }
    @keyframes glow-mp { from{box-shadow:0 0 4px rgba(197,110,248,.5)} to{box-shadow:0 0 20px rgba(197,110,248,.9)} }

    /* ── SET HISTORY ── */
    #pin-sets {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
      margin-top: 28px;
    }
    .pin-set-pill {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 5px 16px; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.4); display: flex; gap: 10px; align-items: center;
    }
    .pin-set-pill.active { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
    .ps-t1 { color: var(--accent); } .ps-t2 { color: #f97316; }

    /* ── BOTTOM TICKER ── */
    #pin-ticker {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 38px; background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; overflow: hidden;
      padding: 0 16px;
    }
    #pin-ticker-inner {
      display: flex; gap: 40px; white-space: nowrap;
      animation: ticker-scroll 30s linear infinite;
    }
    #pin-ticker-inner:empty::before {
      content: '🏆 Athena-X Live Scores';
      font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 600;
    }
    @keyframes ticker-scroll { 0%{ transform:translateX(0) } 100%{ transform:translateX(-50%) } }
    .ticker-item {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45);
      display: flex; align-items: center; gap: 8px;
    }
    .ticker-live { color: #ef4444; animation: pulse-opacity 1.2s ease-in-out infinite; }
    @keyframes pulse-opacity { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── RESULT OVERLAY ── */
    #pin-result-overlay {
      display: none;
      position: absolute; inset: 0; z-index: 10;
      background: rgba(0,0,0,0.65);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      border-radius: 28px;
    }
    #pin-result-overlay.show { display: flex; animation: fade-in 0.5s ease; }
    @keyframes fade-in { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
    #pin-result-overlay .trophy { font-size: 72px; }
    #pin-result-overlay .winner-text { font-size: clamp(22px,4vw,36px); font-weight:900; color:white; text-align:center; }
    #pin-result-overlay .result-sub { font-size:16px; color:rgba(255,255,255,0.5); font-weight:700; }

    /* ── CLOCK ── */
    #pin-clock { font-size:13px; font-weight:700; color:rgba(255,255,255,0.3); font-variant-numeric:tabular-nums; }

    /* ── RESPONSIVE ── */
    @media(max-width:600px) {
      #pin-card { padding:24px 16px; gap:10px; }
      .pin-score { font-size: 64px; }
      .pin-team-name { font-size: 14px; }
    }
  </style>
</head>
<body>
<div id="pin-root">
  <!-- TOP STRIP -->
  <div id="pin-topstrip">
    <div class="logo">📌 ATHENA-X &nbsp;LIVE</div>
    <div class="actions">
      <span id="pin-clock"></span>
      <button class="pin-ctrl-btn" onclick="toggleFullscreen()" id="fs-btn">⛶ Fullscreen</button>
      <a class="pin-ctrl-btn" href="/admin/events/{{ event.id }}" target="_blank">⚙ Admin</a>
      <a class="pin-ctrl-btn" href="/matches">← Matches</a>
      <a class="pin-ctrl-btn" href="javascript:window.close()">✕ Close</a>
    </div>
  </div>

  <!-- SPORT LABEL -->
  <div id="pin-sport-label">
    {{ event.sport_icon or '🏆' }} &nbsp;{{ event.sport_name or 'Match' }}
    &nbsp;·&nbsp; {{ event.title }}
  </div>

  <!-- MAIN SCORE CARD -->
  <div id="pin-card">
    <div id="pin-result-overlay">
      <div class="trophy">🏆</div>
      <div class="winner-text" id="pin-winner-text">Winner!</div>
      <div class="result-sub" id="pin-result-sub"></div>
    </div>

    <!-- TEAM 1 -->
    <div class="pin-team" id="team1-block">
      <div class="pin-team-name t1" id="pin-t1-name">{{ event.team1 or 'Team 1' }}</div>
      <div class="pin-team-players" id="pin-t1-players"></div>
      <div class="pin-score t1" id="pin-t1-score">—</div>
      <div class="pin-serving" id="pin-t1-serving"></div>
    </div>

    <!-- CENTER -->
    <div class="pin-center">
      <div class="pin-game-label" id="pin-game-label">GAME</div>
      <div class="pin-game-num" id="pin-game-num">1</div>
      <div class="pin-vs">VS</div>
      <div class="pin-badges">
        <span id="pin-live-badge" class="pin-badge-live">● LIVE</span>
        <span id="pin-deuce-badge" class="pin-badge-deuce" style="display:none;">⚡ DEUCE</span>
        <span id="pin-mp-badge" class="pin-badge-mp" style="display:none;">🏆 MATCH POINT</span>
      </div>
    </div>

    <!-- TEAM 2 -->
    <div class="pin-team" id="team2-block">
      <div class="pin-team-name t2" id="pin-t2-name">{{ event.team2 or 'Team 2' }}</div>
      <div class="pin-team-players" id="pin-t2-players"></div>
      <div class="pin-score t2" id="pin-t2-score">—</div>
      <div class="pin-serving" id="pin-t2-serving"></div>
    </div>
  </div>

  <!-- SET/GAME HISTORY -->
  <div id="pin-sets"></div>

  <!-- TICKER -->
  <div id="pin-ticker">
    <div id="pin-ticker-inner"></div>
  </div>
</div>

<script>
const EID = {{ event.id }};
const SPORT = {{ (event.sport_name or '')|lower|tojson }};

// ── CLOCK ──────────────────────────────────────────────────────────
function updateClock() {
  const d = new Date();
  document.getElementById('pin-clock').textContent =
    d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── FULLSCREEN ─────────────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fs-btn').textContent = '⛶ Exit Fullscreen';
  } else {
    document.exitFullscreen();
    document.getElementById('fs-btn').textContent = '⛶ Fullscreen';
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fs-btn');
  if (btn) btn.textContent = document.fullscreenElement ? '⛶ Exit Fullscreen' : '⛶ Fullscreen';
});

// ── TICKER ─────────────────────────────────────────────────────────
async function updateTicker() {
  try {
    const data = await (await fetch('/api/live_matches')).json();
    const inner = document.getElementById('pin-ticker-inner');
    if (!inner) return;
    const items = data.map(m => {
      const score = (m.score_t1 !== null && m.score_t2 !== null)
        ? `${m.score_t1} – ${m.score_t2}` : m.result || '';
      const extra = m.extra ? ` · ${m.extra}` : '';
      const live = m.status === 'live' ? '<span class="ticker-live">● LIVE</span> ' : '';
      return `<div class="ticker-item">${m.sport_icon||'🏆'} ${live}<strong>${m.team1} vs ${m.team2}</strong> <span style="color:rgba(255,255,255,0.7);">${score}${extra}</span></div>`;
    }).join('');
    // Duplicate for seamless scroll
    inner.innerHTML = items + items;
    // Adjust animation duration based on content width
    const totalW = inner.scrollWidth / 2;
    const speed = 60; // px/s
    inner.style.animationDuration = Math.max(15, totalW / speed) + 's';
  } catch(e) {}
}

// ── MAIN SCORE UPDATER ─────────────────────────────────────────────
function setEl(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val !== null && val !== undefined ? val : '—';
}
function showEl(id, show) {
  const el = document.getElementById(id);
  if (el) el.style.display = show ? '' : 'none';
}

let _lastState = null;

async function updatePin() {
  try {
    // Try sport-specific state endpoints
    let state = null;
    if (SPORT.includes('badminton')) {
      const r = await fetch(`/api/badminton/${EID}/state`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('cricket')) {
      const r = await fetch(`/api/event/${EID}/live`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('football') || SPORT.includes('soccer')) {
      const r = await fetch(`/api/football/${EID}/state`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('basketball')) {
      const r = await fetch(`/api/basketball/${EID}/state`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('volleyball')) {
      const r = await fetch(`/api/volleyball/${EID}/state`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('kabaddi')) {
      const r = await fetch(`/api/kabaddi/${EID}/state`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('chess')) {
      const r = await fetch(`/api/chess/${EID}/state`);
      if (r.ok) state = await r.json();
    } else if (SPORT.includes('carrom')) {
      const r = await fetch(`/api/carrom/${EID}/state`);
      if (r.ok) state = await r.json();
    }

    // Fallback: use live_matches endpoint
    if (!state) {
      const matches = await (await fetch('/api/live_matches')).json();
      state = matches.find(m => m.id === EID) || null;
    }

    if (!state) return;

    // Render based on sport state shape
    if (SPORT.includes('badminton') && state.team1) {
      renderBadminton(state);
    } else if (state.team1_score !== undefined || state.score_t1 !== undefined) {
      renderGeneric(state);
    }
  } catch(e) {}
}

function renderBadminton(s) {
  setEl('pin-t1-name', s.team1);
  setEl('pin-t2-name', s.team2);

  // Players
  const p1 = s.players && s.players[s.team1] ? s.players[s.team1].map(p=>p.player_name).join(' / ') : '';
  const p2 = s.players && s.players[s.team2] ? s.players[s.team2].map(p=>p.player_name).join(' / ') : '';
  setEl('pin-t1-players', p1);
  setEl('pin-t2-players', p2);

  const cg = s.current_game;
  const t1s = cg ? cg.team1_score : s.team1_games;
  const t2s = cg ? cg.team2_score : s.team2_games;

  // Show current game score in big numbers, games won as sub label
  setEl('pin-t1-score', t1s !== undefined ? t1s : '—');
  setEl('pin-t2-score', t2s !== undefined ? t2s : '—');

  // Game label
  if (cg) {
    setEl('pin-game-label', 'GAME');
    setEl('pin-game-num', cg.game_no);
  }

  // Serving
  setEl('pin-t1-serving', (cg && cg.server === s.team1) ? '🏸 SERVING' : '');
  setEl('pin-t2-serving', (cg && cg.server === s.team2) ? '🏸 SERVING' : '');

  // Deuce / MP
  const deuce = t1s >= 20 && t2s >= 20;
  const mp1 = !deuce && ((t1s >= 20 && t1s - t2s === 1) || t1s === 29);
  const mp2 = !deuce && ((t2s >= 20 && t2s - t1s === 1) || t2s === 29);
  showEl('pin-deuce-badge', deuce);
  const mpEl = document.getElementById('pin-mp-badge');
  if (mpEl) {
    mpEl.style.display = (mp1 || mp2) ? '' : 'none';
    mpEl.textContent = mp1 ? `🏆 MP · ${s.team1}` : mp2 ? `🏆 MP · ${s.team2}` : '';
  }

  // Live/Final badge
  const liveEl = document.getElementById('pin-live-badge');
  if (liveEl) {
    liveEl.textContent = s.status === 'completed' ? '✓ FINAL' : '● LIVE';
    liveEl.className = s.status === 'completed' ? 'pin-badge-final' : 'pin-badge-live';
  }

  // Set history
  const setsEl = document.getElementById('pin-sets');
  if (setsEl && s.games) {
    setsEl.innerHTML = s.games.map(g => {
      const active = g.status === 'active' ? ' active' : '';
      const w1col = g.team1_score > g.team2_score ? 'ps-t1' : '';
      const w2col = g.team2_score > g.team1_score ? 'ps-t2' : '';
      const tick = g.winner ? ' <span style="color:#10b981;font-size:11px;">✓</span>' : '';
      return `<div class="pin-set-pill${active}"><span style="font-size:11px;color:rgba(255,255,255,.25);">G${g.game_no}</span><span class="${w1col}">${g.team1_score}</span><span style="color:rgba(255,255,255,.2)">–</span><span class="${w2col}">${g.team2_score}</span>${tick}</div>`;
    }).join('');
  }

  // Result overlay
  if (s.status === 'completed' && s.result) {
    showResultOverlay(s.result);
  }
}

function renderGeneric(s) {
  const t1 = s.team1 || s.player1 || 'Team 1';
  const t2 = s.team2 || s.player2 || 'Team 2';
  setEl('pin-t1-name', t1);
  setEl('pin-t2-name', t2);

  // Support all score field names across sports
  const s1 = s.team1_score ?? s.team1_sets ?? s.team1_games ?? s.team1_boards ?? s.player1_score ?? s.score_t1;
  const s2 = s.team2_score ?? s.team2_sets ?? s.team2_games ?? s.team2_boards ?? s.player2_score ?? s.score_t2;
  setEl('pin-t1-score', s1 !== null && s1 !== undefined ? s1 : '—');
  setEl('pin-t2-score', s2 !== null && s2 !== undefined ? s2 : '—');

  // Score unit label
  let unit = 'SCORE';
  if (SPORT.includes('volleyball')) unit = 'SETS';
  else if (SPORT.includes('badminton')) unit = 'GAMES';
  else if (SPORT.includes('chess')) unit = 'PTS';
  else if (SPORT.includes('carrom')) unit = 'BOARDS';
  else if (SPORT.includes('cricket')) unit = 'INNINGS';
  setEl('pin-game-label', unit);

  // Extra info (e.g. current set/game scores, cricket innings)
  const extraEl = document.getElementById('pin-game-num');
  if (extraEl) {
    if (SPORT.includes('volleyball') && s.sets) {
      const cs = s.sets.find(x=>x.status==='active');
      extraEl.textContent = cs ? `${cs.team1_score}–${cs.team2_score}` : '';
    } else if (SPORT.includes('chess') && s.current_game_obj) {
      const cg = s.current_game_obj;
      extraEl.textContent = `G${cg.game_no}`;
    } else if (SPORT.includes('carrom') && s.current_board_obj) {
      const cb = s.current_board_obj;
      extraEl.textContent = `B${cb.board_no}: ${cb.team1_score}–${cb.team2_score}`;
    } else if (SPORT.includes('cricket') && s.innings) {
      const active = s.innings.find(i=>i.status==='active');
      extraEl.textContent = active ? `${active.total_runs}/${active.wickets}` : '';
    } else {
      extraEl.textContent = '';
    }
  }

  const liveEl = document.getElementById('pin-live-badge');
  if (liveEl) {
    const isLive = s.status === 'live';
    liveEl.textContent = isLive ? '● LIVE' : (s.status === 'completed' ? '✓ FINAL' : s.status || 'UPCOMING');
    liveEl.className = isLive ? 'pin-badge-live' : 'pin-badge-final';
  }

  if (s.status === 'completed' && s.result) {
    showResultOverlay(s.result);
  }
}

let _overlayShown = false;
function showResultOverlay(result) {
  if (_overlayShown) return;
  _overlayShown = true;
  const ov = document.getElementById('pin-result-overlay');
  const wt = document.getElementById('pin-winner-text');
  const rs = document.getElementById('pin-result-sub');
  if (!ov) return;
  if (wt) wt.textContent = result;
  if (rs) rs.textContent = 'Match Over';
  ov.classList.add('show');
  // Auto-hide after 8s
  setTimeout(() => { ov.classList.remove('show'); }, 8000);
}

// ── INIT ───────────────────────────────────────────────────────────
updatePin();
updateTicker();
setInterval(updatePin, 5000);
setInterval(updateTicker, 15000);

// Try auto-fullscreen on page load
setTimeout(() => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}, 500);
</script>
</body>
</html>
